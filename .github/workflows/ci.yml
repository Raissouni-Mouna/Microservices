name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupérer le code
      - uses: actions/checkout@v4

      # 2. Java
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # 3. Build + tests Maven
      - name: Build project
        run: mvn clean verify

      # 4. SonarCloud analysis
      - name: SonarCloud Scan
        run: |
          mvn sonar:sonar \
            -Dsonar.organization=raissouni-mouna \
            -Dsonar.projectKey=Raissouni-Mouna_Microservices \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=7d0f55319d198991ab1e3023101b3f46a545ad4b